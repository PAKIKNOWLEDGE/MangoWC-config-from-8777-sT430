# 我觉得按win+r就能立马重载很酷有没有人懂的
bind=SUPER,r,reload_config
# --- 系统逃生与核心功能 ---
# 为什么叫逃生 因为当你的gui崩坏的时候只有大喊terminal才能大仇得报
# 如果真的全卡死了，记得按Ctrl + Alt + F2到F6进入TTY核战避难所
bind=SUPER,Return,spawn,kitty
# rofi不好用别用了
bind=SUPER,space,spawn,fuzzel
bind=SUPER,q,killclient,
bind=SUPER+SHIFT,e,quit
# Mango 暂无 Niri 的热键覆盖层，用 reload 代替
bind=SUPER,r,reload_config
# --- 卷轴导航 (HJKL / 方向键) ---
# 其实我不太会用vim
# Mango 的 scroller 布局下：focusdir 对应 Niri 的 focus-column
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,righ
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right

# 列内上下移动 (针对 stack 模式)
# 逗逗你的呀
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# --- 窗口移动 (Shift + HJKL) ---
# 其实我大部分时候都用方向键
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down

# --- 工作区管理 (回归数字键) ---
# view 对应 focus-workspace
# 有小键盘的小朋友请在num lock的陪同下配置哟
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag 对应 move-column-to-workspace
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# --- 窗口尺寸与布局 ---
bind=SUPER,f,togglemaximizescreen,        # 类似 Niri maximize-column
bind=SUPER+SHIFT,f,togglefullscreen,
bind=SUPER,c,center_window,                # 需在 scroller 模式下
# bind=SUPER,r,switch_proportion_preset,     # 在预设宽度间切换
# 我喜欢手动调 我把win+r留给重载啦 如果你需要的话自己把井号删掉

# 尺寸微调 (Niri 的减号/等号习惯)
bind=SUPER,minus,resizewin,-50,0
bind=SUPER,equal,resizewin,+50,0

# --- 增强组件替代 (摆脱 DMS 进程) ---
# 剪切板改用cliphist
bind=SUPER,v,spawn_shell,cliphist list | wofi --dmenu | cliphist decode | wl-copy
# 概览模式
bind=SUPER,Tab,toggleoverview,0
bind=SUPER,d,toggleoverview,0

# --- 媒体与硬件控制 (T430 物理键) ---
# 注意：你需要安装 brightnessctl 和 wireplumber
bind=none,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%-
bind=none,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%+
bind=none,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=none,XF86MonBrightnessUp,spawn,brightnessctl set 5%+
bind=none,XF86MonBrightnessDown,spawn,brightnessctl set 5%-

# --- 截图 (使用 grim + swappy) ---
bind=none,Print,spawn_shell,grim -g "$(slurp)" - | swappy -f -

# 保留经典 Alt+Tab 切换焦点
# 你还是忘不了Windows对吗 😢
bind=ALT,Tab,focusstack,next

# 同时保留SUPER+Tab 进入概览
# 好梦在何方...😴
bind=SUPER,Tab,viewoverview
